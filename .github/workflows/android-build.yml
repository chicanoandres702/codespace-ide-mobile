name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      # Detect whether release signing secrets are available
      - name: Check for signing secrets
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Path 1: signed RELEASE build (when secrets exist) ----
      - name: Decode keystore
        if: steps.signing.outputs.release == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "KEYSTORE_FILE=$PWD/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        if: steps.signing.outputs.release == 'true'
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleProdRelease --stacktrace

      # ---- Path 2: installable DEBUG build (no secrets needed) ----
      - name: Build debug APK
        if: steps.signing.outputs.release == 'false'
        run: ./gradlew assembleProdDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codespace-ide-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/**/*.apk
