name: Build Android APK


on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      - name: Check for signing secrets
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build debug APK
        if: steps.signing.outputs.release == 'false'
        working-directory: android
        run: ./gradlew assembleProdDebug --stacktrace --no-build-cache

      - name: Build signed release APK
        if: steps.signing.outputs.release == 'true'
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleProdRelease --stacktrace --no-build-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codespace-ide-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
